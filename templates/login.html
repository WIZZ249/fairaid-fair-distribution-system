<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairAid - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">FairAid System Login</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="color: #e74c3c; text-align: center; margin-bottom: 15px;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #7f8c8d;">Username</label>
                <input type="text" name="username" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;" required>
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 5px; color: #7f8c8d;">Password</label>
                <input type="password" name="password" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;" required>
            </div>
            <button type="submit" style="width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Sign In</button>
        </form>
    </div>
</body>
</html>
