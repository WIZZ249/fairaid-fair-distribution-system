<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FairAid - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080f;--surface:#0e1117;--card:#131820;--border:#1e2a3a;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:1.5rem;font-weight:700;margin-bottom:6px}
.login-logo p{color:var(--muted);font-size:0.85rem}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.form-group input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:0.9rem;outline:none;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--accent)}
.btn-login{width:100%;background:var(--accent);color:white;border:none;padding:13px;border-radius:8px;font-weight:600;font-size:0.9rem;cursor:pointer;transition:all 0.2s}
.btn-login:hover{background:#2563eb}
.flash{padding:10px 14px;border-radius:8px;margin-bottom:18px;font-size:0.85rem;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red)}
.default-creds{margin-top:20px;text-align:center;font-size:0.78rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <h1>FairAid</h1>
    <p>Humanitarian Distribution System</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required placeholder="Enter username" autofocus/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="Enter password"/>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
  <div class="default-creds">Default: <strong>admin</strong> / <strong>admin123</strong></div>
</div>
</body>
</html>
