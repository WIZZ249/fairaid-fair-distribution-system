<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FairAid | Distribution Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>FairAid Distribution System</h1>
            <p class="subtitle">AI-Assisted Fairness Scoring for Humanitarian Relief</p>
        </header>

        <table>
            <thead>
                <tr>
                    <th>Beneficiary Name</th>
                    <th>Vulnerability Score</th>
                    <th>Priority Factors</th>
                </tr>
            </thead>
            <tbody>
                {% for row in tables %}
                <tr>
                    <td><strong>{{ row.name }}</strong></td>
                    <td><span class="score-pill">{{ row.vulnerability_score }}</span></td>
                    <td>
                        {% for factor in row.explanation.split(', ') %}
                            <span class="badge">{{ factor }}</span>
                        {% endfor %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
