<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FairAid - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Form centering and spacing */
        .register-card {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .field-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            color: #3498db;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        input[type="text"], input[type="number"] {
            padding: 12px;
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
        }

        /* Styling for checkboxes to prevent overlap */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            color: #ccc;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover { background: #2ecc71; }
    </style>
</head>
<body style="background: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div class="register-card">
        <h2 style="color: white; margin-top: 0; margin-bottom: 5px;">Register New Beneficiary</h2>
        <p style="color: #777; margin-bottom: 30px; font-size: 0.9rem;">Enter details for automated priority scoring.</p>

        <form action="{{ url_for('add_beneficiary') }}" method="POST">
            <div class="field-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Full Name">
            </div>

            <div style="display: flex; gap: 20px;">
                <div class="field-group" style="flex: 1;">
                    <label>Age</label>
                    <input type="number" name="age" required placeholder="Age">
                </div>
                <div class="field-group" style="flex: 1;">
                    <label>Monthly Income ($)</label>
                    <input type="number" step="0.01" name="income" required placeholder="e.g. 150">
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" name="is_displaced" id="is_displaced">
                <label for="is_displaced" style="color: white; text-transform: none; margin: 0; cursor: pointer;">Is Displaced / Refugee</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" name="is_disabled" id="is_disabled">
                <label for="is_disabled" style="color: white; text-transform: none; margin: 0; cursor: pointer;">Has Physical Disability</label>
            </div>

            <button type="submit" class="submit-btn">Save to SQL Database</button>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="{{ url_for('index') }}" style="color: #e74c3c; text-decoration: none; font-weight: bold;">Cancel and Go Back</a>
            </div>
        </form>
    </div>
</body>
</html>
